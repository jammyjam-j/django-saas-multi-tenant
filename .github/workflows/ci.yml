name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort
      - name: Run flake8
        run: flake8 . --max-line-length=120
      - name: Check code formatting with black
        run: black --check .
      - name: Check imports order with isort
        run: isort --check-only .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
        django-version: ["4.2", "5.0"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Django==${{ matrix.django-version }} psycopg2-binary
      - name: Run migrations
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
        run: |
          python manage.py migrate --noinput
      - name: Run tests
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
        run: |
          coverage run --source=saas,tenants,billing,api,core manage.py test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: jammyjam/django-saas-multi-tenant:${{ github.sha }},jammyjam/django-saas-multi-tenant:latest
          push: true

  docker-compose-test:
    runs-on: ubuntu-latest
    needs: build-docker
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      app:
        image: jammyjam/django-saas-multi-tenant:${{ github.sha }}
        env_file: .env.testing
        depends_on:
          postgres:
            condition: service_healthy
        ports:
          - 8000:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Wait for services
        run: |
          timeout 60 sh -c 'until curl -s http://localhost:8000; do sleep 5; done'
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://testuser:testpass@postgres:5432/testdb
        run: |
          docker exec app coverage run --source=saas,tenants,billing,api,core manage.py test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety
      - name: Run safety scan
        run: safety check -r requirements.txt

  codeql-analysis:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  publish-test-results:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-compose-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: junit-reports
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "**/TEST-*.xml"